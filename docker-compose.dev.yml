# Supplément de développement local — fonctionne AVEC docker-compose.yml (database-per-service)
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Expose tous les ports pour le débogage, et passe APP_ENV=development
# pour que les services démarrent en mode --reload (plus rapide à l'itération).
#
# Ports :
#   nginx         → 8080          (gateway, cible du proxy Vite)
#   auth          → 8001
#   candidate     → 8002
#   document      → 8003
#   search        → 8004
#   company       → 8005
#   payment       → 8006
#   notification  → 8007
#   audit         → 8008
#   admin         → 8009
#   parsing       → 8010
#   postgres-auth → 5441          (accès DBeaver / psql)
#   postgres-candidate → 5442
#   postgres-company   → 5443
#   postgres-payment   → 5444
#   postgres-document  → 5445
#   postgres-logs      → 5446
#   redis         → 6379
#   minio         → 9000 (API S3), 9001 (console)
#   elasticsearch → 9200
#   kibana        → 5601

services:

  # --- API GATEWAY ---
  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"

  # --- BACKEND SERVICES ---
  auth:
    environment:
      APP_ENV: development
    ports:
      - "${AUTH_PORT:-8001}:8000"

  candidate:
    environment:
      APP_ENV: development
    ports:
      - "${CANDIDATE_PORT:-8002}:8000"

  document:
    environment:
      APP_ENV: development
    ports:
      - "${DOCUMENT_PORT:-8003}:8000"

  search:
    environment:
      APP_ENV: development
    ports:
      - "${SEARCH_PORT:-8004}:8000"

  company:
    environment:
      APP_ENV: development
    ports:
      - "${COMPANY_PORT:-8005}:8000"

  payment:
    environment:
      APP_ENV: development
    ports:
      - "${PAYMENT_PORT:-8006}:8000"

  notification:
    environment:
      APP_ENV: development
    ports:
      - "${NOTIFICATION_PORT:-8007}:8000"

  audit:
    environment:
      APP_ENV: development
    ports:
      - "${AUDIT_PORT:-8008}:8000"

  admin:
    environment:
      APP_ENV: development
    ports:
      - "${ADMIN_PORT:-8009}:8000"

  parsing:
    environment:
      APP_ENV: development
    ports:
      - "${PARSING_PORT:-8010}:8000"

  # --- BASES DE DONNÉES (accès direct DBeaver / psql) ---
  postgres-auth:
    ports:
      - "${POSTGRES_AUTH_PORT:-5441}:5432"

  postgres-candidate:
    ports:
      - "${POSTGRES_CANDIDATE_PORT:-5442}:5432"

  postgres-company:
    ports:
      - "${POSTGRES_COMPANY_PORT:-5443}:5432"

  postgres-payment:
    ports:
      - "${POSTGRES_PAYMENT_PORT:-5444}:5432"

  postgres-document:
    ports:
      - "${POSTGRES_DOCUMENT_PORT:-5445}:5432"

  postgres-logs:
    ports:
      - "${POSTGRES_LOGS_PORT:-5446}:5432"

  # --- INFRASTRUCTURE ---
  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  elasticsearch:
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"

  kibana:
    ports:
      - "${KIBANA_PORT:-5601}:5601"
